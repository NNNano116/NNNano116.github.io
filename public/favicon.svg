<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- 페이지 글라스 패널과 동일 톤: 연한 블루·라벤더 반투명 -->
    <radialGradient id="glass" cx="34%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#eaf0fb" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#d7e0f0" stop-opacity="0.62"/>
    </radialGradient>
    <!-- 블루↔퍼플 컬러 글로우(레이저/그라데이션 반사 느낌) -->
    <radialGradient id="tintA" cx="22%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#4a86de" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#4a86de" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tintB" cx="80%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#9676e0" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#9676e0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="14%" y1="6%" x2="86%" y2="96%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#c3d2ea" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="text" x1="20%" y1="14%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#3f6fd1"/>
      <stop offset="100%" stop-color="#7d54d6"/>
    </linearGradient>
  </defs>

  <!-- 글라스 원형 본체 -->
  <circle cx="32" cy="32" r="29" fill="url(#glass)"/>
  <circle cx="32" cy="32" r="29" fill="url(#tintA)"/>
  <circle cx="32" cy="32" r="29" fill="url(#tintB)"/>
  <!-- 유리 테두리(이중 림: 외곽 + 내부 하이라이트) -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="url(#ring)" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="26.5" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>
  <!-- 상단 글라스 하이라이트(반사광) -->
  <ellipse cx="26" cy="17" rx="15" ry="7" fill="#ffffff" fill-opacity="0.5"/>

  <!-- J·Y 워드마크 -->
  <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="25" font-weight="700" letter-spacing="-0.5"
        fill="url(#text)">J·Y</text>
</svg>
